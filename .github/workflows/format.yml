name: Format

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  rustfmt:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install rustfmt
        run: rustup component add rustfmt

      - name: cargo fmt --check
        run: bash ./scripts/format.sh --check
